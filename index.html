<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#7B5EA7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="BAILY">
  <link rel="manifest" href="manifest.json">
  <title>BAILY — Maquillaje Premium</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --purple:      #7B5EA7;
      --purple-dark: #5C3D8F;
      --purple-light:#9B7EC8;
      --purple-pale: #EDE7F6;
      --cream:       #FBF8FF;
      --white:       #FFFFFF;
      --text:        #1A1A2E;
      --text-soft:   #6B6B8A;
      --text-light:  #A8A8C0;
      --success:     #4CAF50;
      --error:       #E53935;
      --gold:        #F4A72A;
      --nav-h:       64px;
      --shadow-sm:   0 2px 8px rgba(123,94,167,0.12);
      --shadow-md:   0 4px 20px rgba(123,94,167,0.18);
      --radius-sm:   8px;
      --radius-md:   16px;
      --radius-lg:   24px;
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html,body { height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--text); }
    #app { height:100vh; display:flex; flex-direction:column; }

    /* HEADER */
    .app-header { height:56px; background:var(--white); display:flex; align-items:center; justify-content:space-between; padding:0 16px; box-shadow:var(--shadow-sm); position:relative; z-index:100; flex-shrink:0; }
    .header-logo { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:600; letter-spacing:3px; color:var(--purple); }
    .header-logo span { color:var(--gold); }
    .header-actions { display:flex; gap:8px; }
    .header-btn { width:38px; height:38px; border-radius:50%; border:none; background:var(--purple-pale); color:var(--purple); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; position:relative; }
    .cart-badge { position:absolute; top:-2px; right:-2px; background:var(--error); color:white; font-size:10px; font-weight:700; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .back-btn { width:38px; height:38px; border-radius:50%; border:none; background:var(--purple-pale); color:var(--purple); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

    /* SCREENS */
    .screen { flex:1; overflow-y:auto; overflow-x:hidden; padding-bottom:calc(var(--nav-h) + 8px); display:none; scrollbar-width:none; }
    .screen::-webkit-scrollbar { display:none; }
    .screen.active { display:block; }

    /* BOTTOM NAV */
    .bottom-nav { height:var(--nav-h); background:var(--white); display:flex; border-top:1px solid #F0EBF8; flex-shrink:0; z-index:100; }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; border:none; background:none; color:var(--text-light); font-size:10px; font-weight:500; font-family:'DM Sans',sans-serif; transition:color .2s; position:relative; }
    .nav-item i { font-size:20px; }
    .nav-item.active { color:var(--purple); }
    .nav-badge { position:absolute; top:8px; right:calc(50% - 18px); background:var(--error); color:white; font-size:9px; font-weight:700; min-width:16px; height:16px; border-radius:8px; display:flex; align-items:center; justify-content:center; padding:0 3px; }

    /* PROMO SLIDER */
    .promo-slider { position:relative; overflow:hidden; }
    .promo-track { display:flex; transition:transform .5s ease; }
    .promo-slide { min-width:100%; padding:20px; display:flex; align-items:center; justify-content:space-between; background:linear-gradient(135deg,var(--purple-dark) 0%,var(--purple) 60%,var(--purple-light) 100%); position:relative; overflow:hidden; min-height:120px; }
    .promo-slide::before { content:''; position:absolute; top:-40px; right:-40px; width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,0.07); }
    .promo-content { flex:1; }
    .promo-tag { display:inline-flex; align-items:center; gap:5px; background:var(--gold); color:var(--text); font-size:10px; font-weight:700; padding:3px 10px; border-radius:20px; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
    .promo-title { color:white; font-size:14px; font-weight:600; line-height:1.4; max-width:200px; }
    .promo-emoji { font-size:64px; flex-shrink:0; }
    .promo-dots { display:flex; gap:6px; justify-content:center; padding:8px; background:var(--purple-dark); }
    .promo-dot { width:6px; height:6px; border-radius:3px; background:rgba(255,255,255,0.3); transition:all .3s; cursor:pointer; }
    .promo-dot.active { width:20px; background:white; }

    /* SECTION HEADERS */
    .sec-header { background:var(--purple); color:white; display:flex; align-items:center; justify-content:space-between; padding:12px 20px; margin:16px 16px 10px; border-radius:var(--radius-md); font-size:16px; font-weight:600; }
    .sec-wings { font-size:14px; opacity:.6; }

    /* BRANDS */
    .brands-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:0 16px 4px; }
    .brand-card { background:var(--white); border-radius:var(--radius-md); padding:12px 8px; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; box-shadow:var(--shadow-sm); transition:transform .15s; }
    .brand-card:active { transform:scale(.96); }
    .brand-name { font-family:'Cormorant Garamond',serif; font-size:15px; font-weight:600; color:var(--purple-dark); text-align:center; }
    .brand-sub { font-size:9px; color:var(--text-light); text-align:center; }

    /* CATEGORIES */
    .cats-scroll { display:flex; gap:12px; padding:0 16px 4px; overflow-x:auto; scrollbar-width:none; }
    .cats-scroll::-webkit-scrollbar { display:none; }
    .cat-item { display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; flex-shrink:0; }
    .cat-circle { width:68px; height:68px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:26px; box-shadow:var(--shadow-sm); transition:transform .15s; }
    .cat-circle:active { transform:scale(.92); }
    .cat-label { font-size:11px; font-weight:500; color:var(--text); text-align:center; max-width:70px; line-height:1.2; }

    /* FAMILIES */
    .families-scroll { display:flex; gap:10px; padding:0 16px 4px; overflow-x:auto; scrollbar-width:none; }
    .families-scroll::-webkit-scrollbar { display:none; }
    .family-card { flex-shrink:0; width:80px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; }
    .family-box { width:80px; height:80px; border-radius:var(--radius-sm); background:var(--purple-pale); display:flex; align-items:center; justify-content:center; font-size:30px; }
    .family-lbl { font-size:10px; color:var(--text-soft); text-align:center; line-height:1.2; }

    /* PRODUCTS GRID */
    .prod-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; padding:0 16px 4px; }
    .prod-card { background:var(--white); border-radius:var(--radius-md); overflow:hidden; cursor:pointer; box-shadow:var(--shadow-sm); transition:transform .15s; position:relative; }
    .prod-card:active { transform:scale(.98); }
    .prod-img { width:100%; height:150px; background:var(--purple-pale); display:flex; align-items:center; justify-content:center; font-size:52px; overflow:hidden; }
    .prod-body { padding:10px; }
    .prod-brand { font-size:10px; color:var(--purple); font-weight:600; text-transform:uppercase; margin-bottom:2px; }
    .prod-name { font-size:12px; font-weight:500; color:var(--text); line-height:1.3; margin-bottom:6px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .prod-price { font-size:16px; font-weight:700; color:var(--purple); }
    .prod-price-bs { font-size:11px; color:var(--text-light); }
    .prod-fav { position:absolute; top:8px; right:8px; width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,.9); border:none; display:flex; align-items:center; justify-content:center; font-size:13px; cursor:pointer; color:var(--text-light); }
    .prod-fav.active { color:var(--error); }
    .prod-badge { position:absolute; top:8px; left:8px; background:var(--gold); color:var(--text); font-size:9px; font-weight:700; padding:2px 7px; border-radius:12px; text-transform:uppercase; }

    /* PRODUCT DETAIL */
    #screen-product { padding-bottom:80px; }
    .pd-img { width:100%; height:280px; background:var(--purple-pale); display:flex; align-items:center; justify-content:center; font-size:96px; }
    .pd-body { padding:18px 16px; }
    .pd-name { font-size:17px; font-weight:700; color:var(--text); text-transform:uppercase; line-height:1.3; margin-bottom:12px; }
    .pd-price { font-size:28px; font-weight:700; color:var(--purple); }
    .pd-price-bs { font-size:14px; color:var(--text-soft); margin-bottom:8px; }
    .tasa-badge { display:inline-flex; align-items:center; gap:5px; background:var(--purple); color:white; font-size:12px; font-weight:600; padding:5px 12px; border-radius:20px; margin-bottom:16px; }
    .pd-meta { display:flex; flex-direction:column; gap:4px; margin-bottom:14px; }
    .pd-meta-row { font-size:13px; color:var(--text-soft); }
    .pd-meta-row strong { color:var(--text); }
    .pd-pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
    .pill { display:inline-flex; align-items:center; gap:5px; border:1.5px solid var(--purple); color:var(--purple); font-size:13px; font-weight:500; padding:6px 14px; border-radius:20px; background:var(--purple-pale); }
    .pill.success { border-color:var(--success); color:var(--success); background:#E8F5E9; }

    /* QTY */
    .qty-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
    .qty-label { font-size:14px; font-weight:500; }
    .qty-ctrl { display:flex; align-items:center; border:1.5px solid #E0DAF0; border-radius:10px; overflow:hidden; }
    .qty-btn { width:40px; height:40px; border:none; background:var(--white); color:var(--purple); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:300; }
    .qty-val { width:40px; text-align:center; font-size:16px; font-weight:600; background:var(--white); }

    /* SHADES */
    .shades-sec { margin-bottom:18px; }
    .shades-lbl { font-size:14px; font-weight:500; margin-bottom:8px; }
    .shades-row { display:flex; gap:8px; flex-wrap:wrap; }
    .shade-dot { width:30px; height:30px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform .15s; }
    .shade-dot.active { border-color:var(--purple-dark); transform:scale(1.18); box-shadow:0 0 0 2px white,0 0 0 4px var(--purple); }

    /* DETAIL SECTIONS */
    .det-sec { margin-bottom:18px; }
    .det-sec-title { font-size:15px; font-weight:700; margin-bottom:8px; }
    .det-sec ul { list-style:none; display:flex; flex-direction:column; gap:4px; }
    .det-sec ul li::before { content:"- "; color:var(--purple); }
    .det-sec ul li, .det-sec p { font-size:13px; color:var(--text-soft); line-height:1.6; }

    /* RELATED */
    .related-scroll { display:flex; gap:10px; padding:0 0 4px; overflow-x:auto; scrollbar-width:none; }
    .related-scroll::-webkit-scrollbar { display:none; }
    .rel-card { flex-shrink:0; width:120px; background:var(--white); border-radius:var(--radius-md); overflow:hidden; cursor:pointer; box-shadow:var(--shadow-sm); }
    .rel-img { width:100%; height:90px; background:var(--purple-pale); display:flex; align-items:center; justify-content:center; font-size:38px; }
    .rel-body { padding:8px; }
    .rel-name { font-size:11px; font-weight:500; color:var(--text); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:3px; }
    .rel-price { font-size:13px; font-weight:700; color:var(--purple); }

    /* ADD TO CART BAR */
    .atc-bar { position:fixed; bottom:0; left:0; right:0; padding:10px 16px; background:var(--white); box-shadow:0 -4px 20px rgba(123,94,167,.15); z-index:200; }
    .atc-btn { width:100%; height:52px; background:var(--purple); color:white; font-size:16px; font-weight:600; border:none; border-radius:var(--radius-md); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; font-family:'DM Sans',sans-serif; }
    .atc-btn:active { background:var(--purple-dark); }

    /* CART */
    .screen-title { font-size:22px; font-weight:700; text-align:center; padding:18px 16px 10px; }
    .cart-list { padding:0 16px; display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
    .cart-item { background:var(--white); border-radius:var(--radius-md); padding:12px; display:flex; gap:12px; box-shadow:var(--shadow-sm); }
    .cart-img { width:58px; height:58px; border-radius:var(--radius-sm); background:var(--purple-pale); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:26px; }
    .cart-info { flex:1; min-width:0; }
    .cart-brand { font-size:10px; color:var(--purple); font-weight:600; text-transform:uppercase; }
    .cart-name { font-size:13px; font-weight:500; color:var(--text); line-height:1.3; margin-bottom:1px; }
    .cart-sku { font-size:11px; color:var(--text-light); margin-bottom:5px; }
    .cart-price { font-size:16px; font-weight:700; color:var(--purple); }
    .cart-price-bs { font-size:10px; color:var(--text-light); }
    .cart-controls { display:flex; align-items:center; gap:6px; margin-top:5px; }
    .cqb { width:28px; height:28px; border-radius:50%; border:none; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:700; }
    .cqb.minus { background:#F0EBF8; color:var(--purple); }
    .cqb.plus { background:var(--purple); color:white; }
    .cqb.del { background:var(--error); color:white; font-size:12px; }
    .cqv { font-size:15px; font-weight:600; min-width:20px; text-align:center; }

    /* CART SUMMARY */
    .cart-summary { margin:0 16px 14px; background:var(--white); border-radius:var(--radius-md); padding:14px; box-shadow:var(--shadow-sm); }
    .sum-row { display:flex; justify-content:space-between; align-items:flex-start; padding:8px 0; border-bottom:1px solid #F0EBF8; }
    .sum-row:last-child { border-bottom:none; }
    .sum-lbl { font-size:14px; color:var(--text-soft); }
    .sum-val { font-size:14px; font-weight:500; text-align:right; }
    .sum-val .sub { font-size:10px; color:var(--text-light); display:block; }
    .disc-val { color:var(--error); }
    .free-val { color:var(--success); font-weight:700; }
    .tot-row { display:flex; justify-content:space-between; align-items:flex-start; padding:12px 0 4px; }
    .tot-lbl { font-size:18px; font-weight:700; }
    .tot-val { font-size:21px; font-weight:700; color:var(--purple); text-align:right; }
    .tot-val .tot-bs { font-size:16px; font-weight:700; color:var(--purple); display:block; }
    .tasa-info { margin:0 16px 12px; padding:10px 14px; background:var(--purple-pale); border-radius:var(--radius-sm); font-size:12px; color:var(--purple); font-style:italic; }
    .procesar-btn { display:flex; align-items:center; justify-content:center; gap:10px; margin:0 16px; width:calc(100% - 32px); height:54px; background:var(--purple); color:white; font-size:16px; font-weight:600; border:none; border-radius:var(--radius-md); cursor:pointer; font-family:'DM Sans',sans-serif; }
    .cart-empty { text-align:center; padding:60px 20px; color:var(--text-soft); }
    .cart-empty i { font-size:52px; color:#E0DAF0; display:block; margin-bottom:14px; }
    .shop-btn { margin-top:14px; padding:12px 28px; background:var(--purple); color:white; border:none; border-radius:var(--radius-md); font-size:14px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }

    /* SEARCH */
    .search-wrap { padding:12px 16px; position:sticky; top:0; background:var(--cream); z-index:10; }
    .search-inp-wrap { position:relative; }
    .search-inp { width:100%; height:46px; border-radius:var(--radius-md); border:1.5px solid #E0DAF0; background:var(--white); padding:0 16px 0 44px; font-size:14px; color:var(--text); font-family:'DM Sans',sans-serif; outline:none; }
    .search-inp:focus { border-color:var(--purple); }
    .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-light); font-size:16px; }
    .filter-chips { display:flex; gap:8px; padding:8px 16px; overflow-x:auto; scrollbar-width:none; }
    .filter-chips::-webkit-scrollbar { display:none; }
    .f-chip { flex-shrink:0; padding:6px 14px; border-radius:20px; border:1.5px solid #E0DAF0; background:var(--white); font-size:12px; font-weight:500; color:var(--text-soft); cursor:pointer; white-space:nowrap; font-family:'DM Sans',sans-serif; }
    .f-chip.active { border-color:var(--purple); background:var(--purple); color:white; }
    .search-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; padding:0 16px; }
    .empty-state { text-align:center; padding:40px 20px; color:var(--text-soft); }
    .empty-state i { font-size:48px; color:#E0DAF0; display:block; margin-bottom:12px; }

    /* BLOG */
    .blog-list { padding:0 16px; display:flex; flex-direction:column; gap:14px; }
    .blog-card { background:var(--white); border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); }
    .blog-img { width:100%; height:150px; background:var(--purple-pale); display:flex; align-items:center; justify-content:center; font-size:52px; }
    .blog-body { padding:14px; }
    .blog-tag { font-size:10px; font-weight:700; color:var(--purple); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
    .blog-title { font-size:16px; font-weight:700; color:var(--text); line-height:1.3; margin-bottom:6px; }
    .blog-excerpt { font-size:13px; color:var(--text-soft); line-height:1.5; }
    .blog-date { font-size:11px; color:var(--text-light); margin-top:8px; }

    /* PROFILE */
    .profile-head { background:linear-gradient(135deg,var(--purple-dark),var(--purple)); padding:36px 20px 28px; text-align:center; color:white; }
    .profile-avatar { width:72px; height:72px; border-radius:50%; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; font-size:32px; margin:0 auto 12px; }
    .profile-menu { padding:14px; display:flex; flex-direction:column; gap:6px; }
    .profile-item { background:var(--white); padding:15px; border-radius:var(--radius-md); display:flex; align-items:center; gap:14px; font-size:14px; font-weight:500; cursor:pointer; box-shadow:var(--shadow-sm); }
    .profile-item i:first-child { color:var(--purple); font-size:17px; width:22px; text-align:center; }
    .p-chevron { margin-left:auto; color:var(--text-light); font-size:13px; }
    .auth-card { margin:16px; background:var(--white); border-radius:var(--radius-lg); padding:24px; box-shadow:var(--shadow-md); }
    .auth-title { font-size:22px; font-weight:700; text-align:center; margin-bottom:4px; }
    .auth-sub { font-size:14px; color:var(--text-soft); text-align:center; margin-bottom:22px; }
    .auth-field { margin-bottom:12px; }
    .auth-field label { font-size:13px; font-weight:500; display:block; margin-bottom:5px; }
    .auth-field input { width:100%; height:46px; border-radius:var(--radius-sm); border:1.5px solid #E0DAF0; padding:0 14px; font-size:14px; font-family:'DM Sans',sans-serif; color:var(--text); outline:none; }
    .auth-field input:focus { border-color:var(--purple); }
    .auth-btn { width:100%; height:50px; background:var(--purple); color:white; border:none; border-radius:var(--radius-md); font-size:16px; font-weight:600; cursor:pointer; margin-top:6px; font-family:'DM Sans',sans-serif; }
    .auth-switch { text-align:center; margin-top:14px; font-size:13px; color:var(--text-soft); }
    .auth-switch span { color:var(--purple); font-weight:600; cursor:pointer; }

    /* TOAST */
    .toast { position:fixed; bottom:calc(var(--nav-h) + 14px); left:16px; right:16px; background:var(--text); color:white; padding:13px 16px; border-radius:var(--radius-md); font-size:14px; font-weight:500; z-index:1000; transform:translateY(80px); opacity:0; transition:all .3s; text-align:center; }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast.success { background:var(--success); }
    .toast.error { background:var(--error); }

    /* WHATSAPP FAB */
    .wa-fab { position:fixed; bottom:calc(var(--nav-h) + 14px); right:16px; width:52px; height:52px; border-radius:50%; background:#25D366; color:white; border:none; font-size:26px; cursor:pointer; box-shadow:0 4px 16px rgba(37,211,102,.4); display:flex; align-items:center; justify-content:center; z-index:90; }
  </style>
</head>
<body>
<div id="app">

  <!-- MAIN HEADER -->
  <header class="app-header" id="main-header">
    <div class="header-logo">B<span>A</span>ILY</div>
    <div class="header-actions">
      <button class="header-btn" onclick="goSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
      <button class="header-btn" onclick="showScreen('cart')">

            <div class="rel-card" onclick="openProduct('${r.id}')">
              <div class="rel-img">${r.emoji}</div>
              <div class="rel-body">
                <div class="rel-name">${r.name}</div>
                <div class="rel-price">$${r.price}</div>
              </div>
            </div>`).join('')}
        </div>`:''}
    </div>`;

  showScreen('product');
  document.getElementById('screen-product').scrollTop=0;
}

function selShade(hex,name,el) {
  curShade=hex;
  document.querySelectorAll('.shade-dot').forEach(d=>d.classList.remove('active'));
  el.classList.add('active');
  const d=document.getElementById('shade-display');
  if(d) d.textContent=name;
}

function chgQty(delta) {
  if(!curProd) return;
  curQty=Math.max(1,Math.min(curProd.stock,curQty+delta));
  const el=document.getElementById('det-qty');
  if(el) el.textContent=curQty;
}

function addCurrentToCart() {
  if(!curProd) return;
  const shadeName = curShade ? curProd.names[curProd.shades.indexOf(curShade)] : null;
  addToCart(curProd,curQty,curShade,shadeName);
  toast('¡Añadido al carrito! 🛍️','success');
}

// ─── CART ────────────────────────────────
function addToCart(prod,qty=1,shade=null,shadeName=null) {
  const key=prod.id+(shade||'');
  const ex=cart.find(i=>i.key===key);
  if(ex) ex.qty=Math.min(ex.qty+qty,prod.stock);
  else cart.push({key,productId:prod.id,name:prod.name,brand:prod.brand,sku:prod.sku,price:prod.price,qty,shade,shadeName,emoji:prod.emoji});
  saveCart();
}

function saveCart() {
  localStorage.setItem('baily_cart',JSON.stringify(cart));
  updateBadge();
}

function updateBadge() {
  const n=cart.reduce((s,i)=>s+i.qty,0);
  ['hdr-badge','pd-badge','nav-badge'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el) return;
    el.textContent=n;
    el.style.display=n>0?'flex':'none';
  });
}

function renderCart() {
  const el=document.getElementById('cart-content');
  if(!cart.length) {
    el.innerHTML=`<div class="cart-empty"><i class="fa-solid fa-cart-shopping"></i><p>Tu carrito está vacío</p><button class="shop-btn" onclick="showScreen('home')">Ver productos</button></div>`;
    return;
  }

  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const desc=S.descActive?sub*S.desc/100:0;
  const subD=sub-desc;
  const envio=subD>=S.freeThreshold?0:S.deliveryCost;
  const iva=subD*S.iva/100;
  const total=subD+envio+iva;

  el.innerHTML=`
    <div class="cart-list">
      ${cart.map((item,idx)=>`
        <div class="cart-item">
          <div class="cart-img">${item.emoji}</div>
          <div class="cart-info">
            <div class="cart-brand">${item.brand}</div>
            <div class="cart-name">${item.name}</div>
            <div class="cart-sku">SKU: ${item.sku}${item.shadeName?' · '+item.shadeName:''}</div>
            <div class="cart-price">$${(item.price*item.qty).toFixed(2)}</div>
            <div class="cart-price-bs">Bs ${(item.price*item.qty*S.tasaBCV).toFixed(2)}</div>
            <div class="cart-controls">
              <button class="cqb minus" onclick="cqty(${idx},-1)">−</button>
              <span class="cqv">${item.qty}</span>
              <button class="cqb plus"  onclick="cqty(${idx},1)">+</button>
              <button class="cqb del"   onclick="cdel(${idx})"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>
        </div>`).join('')}
    </div>

    <div class="cart-summary">
      <div class="sum-row">
        <div class="sum-lbl">Subtotal</div>
        <div class="sum-val">$${sub.toFixed(2)}<span class="sub">Bs ${(sub*S.tasaBCV).toFixed(2)}</span></div>
      </div>
      ${S.descActive?`
      <div class="sum-row">
        <div class="sum-lbl">Descuento (${S.desc}%)</div>
        <div class="sum-val disc-val">−$${desc.toFixed(2)}<span class="sub">−Bs ${(desc*S.tasaBCV).toFixed(2)}</span></div>
      </div>
      <div class="sum-row">
        <div class="sum-lbl">Subtotal con descuento</div>
        <div class="sum-val">$${subD.toFixed(2)}<span class="sub">Bs ${(subD*S.tasaBCV).toFixed(2)}</span></div>
      </div>`:''}
      <div class="sum-row">
        <div class="sum-lbl">Envío</div>
        <div class="sum-val ${envio===0?'free-val':''}">${envio===0?'Gratis':'$'+envio.toFixed(2)}</div>
      </div>
      <div class="sum-row">
        <div class="sum-lbl">IVA (${S.iva}%)</div>
        <div class="sum-val">$${iva.toFixed(2)}<span class="sub">Bs ${(iva*S.tasaBCV).toFixed(2)}</span></div>
      </div>
      <div class="tot-row">
        <div class="tot-lbl">Total</div>
        <div class="tot-val">$${total.toFixed(2)}<span class="tot-bs">Bs ${(total*S.tasaBCV).toFixed(2)}</span></div>
      </div>
    </div>

    <div class="tasa-info">Tasa BCV: Bs. ${S.tasaBCV.toLocaleString('es-VE')} por $</div>
    <button class="procesar-btn" onclick="sendWA()"><i class="fa-solid fa-whatsapp"></i> Procesar Orden</button>
    <div style="height:20px"></div>`;
}

function cqty(idx,d) {
  const p=PRODUCTS.find(x=>x.id===cart[idx].productId);
  cart[idx].qty=Math.max(1,Math.min(p?p.stock:99,cart[idx].qty+d));
  saveCart(); renderCart();
}
function cdel(idx) { cart.splice(idx,1); saveCart(); renderCart(); }

// ─── SEARCH ──────────────────────────────
(function initSearch() {
  document.getElementById('filter-chips').innerHTML =
    [{label:'Todos',id:null},...CATS.slice(0,5)].map((c,i)=>
      `<div class="f-chip ${i===0?'active':''}" onclick="chipFilter('${c.id||''}',this)">${c.label||c.name}</div>`
    ).join('');
  renderSearchRes(PRODUCTS);
})();

function chipFilter(id,el) {
  document.querySelectorAll('.f-chip').forEach(c=>c.classList.remove('active'));

  renderSearchRes(id?PRODUCTS.filter(p=>p.catId===id):PRODUCTS);
}

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    const q=document.getElementById('search-inp').value.toLowerCase().trim();
    renderSearchRes(!q?PRODUCTS:PRODUCTS.filter(p=>
      p.name.toLowerCase().includes(q)||p.brand.toLowerCase().includes(q)||
      p.cat.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q)
    ));
  },250);
}

function renderSearchRes(list) {
  const el=document.getElementById('search-results');
  el.innerHTML=!list.length
    ?`<div class="empty-state"><i class="fa-solid fa-magnifying-glass"></i><p>Sin resultados</p></div>`
    :`<div class="search-grid">${list.map(prodCard).join('')}</div>`;
}

function filterBrand(bid) {
  showScreen('search');
  renderSearchRes(PRODUCTS.filter(p=>p.brandId===bid));
}
function filterCat(cid) {
  showScreen('search');
  renderSearchRes(PRODUCTS.filter(p=>p.catId===cid));
}

// ─── FAVORITES ───────────────────────────
function toggleFav(id,btn) {
  const i=favs.indexOf(id);
  if(i>=0){favs.splice(i,1);btn.classList.remove('active');btn.innerHTML='<i class="fa-regular fa-heart"></i>';}
  else{favs.push(id);btn.classList.add('active');btn.innerHTML='<i class="fa-solid fa-heart"></i>';}
  localStorage.setItem('baily_favs',JSON.stringify(favs));
}

// ─── WHATSAPP ────────────────────────────
function sendWA() {
  if(!cart.length){toast('Tu carrito está vacío','error');return;}
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const desc=S.descActive?sub*S.desc/100:0;
  const subD=sub-desc;
  const iva=subD*S.iva/100;
  const total=subD+iva;
  let msg=`🦋 *Pedido BAILY*\n\n`;
  cart.forEach(i=>{
    msg+=`• ${i.name} (${i.brand})`;
    if(i.shadeName) msg+=` - Tono: ${i.shadeName}`;
    msg+=`\n  x${i.qty} = $${(i.price*i.qty).toFixed(2)}\n`;
  });
  msg+=`\n💰 Subtotal: $${sub.toFixed(2)}`;
  if(S.descActive) msg+=`\n🎉 Descuento (${S.desc}%): -$${desc.toFixed(2)}`;
  msg+=`\n📊 IVA (${S.iva}%): $${iva.toFixed(2)}\n✅ *TOTAL: $${total.toFixed(2)}*`;
  msg+=`\n🏦 Bs. ${(total*S.tasaBCV).toFixed(2)} (Tasa BCV ${S.tasaBCV})`;
  msg+=`\n\n¡Quiero procesar este pedido! 🛍️`;
  window.open(`https://wa.me/${S.wa}?text=${encodeURIComponent(msg)}`,'_blank');
}

// ─── TOAST ───────────────────────────────
let _tt=null;
function toast(msg,type='') {
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast show'+(type?' '+type:'');
  clearTimeout(_tt);
  _tt=setTimeout(()=>el.classList.remove('show'),2500);
}

// ─── INIT ────────────────────────────────
updateBadge();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
